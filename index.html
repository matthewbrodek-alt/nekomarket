<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>NEKOMARKET</title>
    
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Inter:wght@400;500;600&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,FILL@0..1&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-background text-on-surface font-body">

    <nav class="fixed top-0 w-full z-50 bg-[#f9f9f9]/80 backdrop-blur-md">
        <div class="flex justify-between items-start px-12 py-6 max-w-[1440px] mx-auto">
            <div class="flex flex-col gap-1">
                <span class="text-2xl font-montserrat font-bold uppercase logo-underline text-primary">NEKOMARKET</span>
                <span class="text-[10px] uppercase tracking-widest text-secondary font-medium" data-i18n="nav-subtitle">Ваш помощник в аренде пушистого друга</span>
            </div>
            
            <div class="flex items-start gap-6">
                <div class="flex gap-2 bg-gray-200/50 p-1 rounded-full text-[10px] font-bold mt-2">
                    <button onclick="changeLanguage('ru')" id="btn-ru" class="px-2 py-1 rounded-full transition-all bg-primary text-white">RU</button>
                    <button onclick="changeLanguage('en')" id="btn-en" class="px-2 py-1 rounded-full transition-all text-secondary">EN</button>
                </div>
                <button class="bg-primary text-white px-8 py-3 rounded-lg font-bold shadow-md hover:opacity-90 transition-all" data-i18n="btn-rent">Арендовать</button>
                <div class="w-16 -mt-4">
                    <img src="image_57aa2b.png" alt="Peeking cat">
                </div>
            </div>
        </div>
    </nav>

    <header class="relative w-full h-screen overflow-hidden flex items-center justify-center">
        <div class="absolute inset-0 z-0">
            <img class="w-full h-full object-cover" src="image_5758a6.jpg">
        </div>
        <div class="relative z-10 text-center select-none">
            <h1 class="text-[12rem] md:text-[18rem] font-black font-montserrat text-white leading-[0.7] opacity-90 mix-blend-overlay">NEKO</h1>
            <h1 class="text-[8rem] md:text-[12rem] font-black font-montserrat text-white leading-[0.7] opacity-80">market</h1>
        </div>
    </header>

    <section class="py-32 px-12 bg-white relative">
        <div class="max-w-[1440px] mx-auto text-center">
            <h2 class="text-4xl font-bold font-headline mb-20" data-i18n="team-title">Наши сотрудники</h2>
            
            <div class="relative max-w-4xl mx-auto" id="cat-team-container">
                <img src="image_57aa69.png" class="w-full shadow-2xl rounded-2xl relative z-10 border border-gray-100">

               <svg class="absolute inset-0 w-full h-full pointer-events-none z-20" viewBox="0 0 800 500" preserveAspectRatio="none">
                        <path d="M 180 460 Q 180 400 200 360" class="arrow-path" />
                        <circle cx="200" cy="360" r="4" class="arrow-dot" />
                        <path d="M 400 480 Q 400 410 400 360" class="arrow-path" />
                        <circle cx="400" cy="360" r="4" class="arrow-dot" />
                        <path d="M 620 460 Q 620 400 590 355" class="arrow-path" />
                        <circle cx="590" cy="355" r="4" class="arrow-dot" />
                </svg>
                <div class="absolute" style="left: 15%; bottom: -40px; z-index: 30;">
                    <div class="cat-label"><span data-i18n="name-1">Пьетро Санчез младший</span> <span class="age" data-i18n="age-1">1 месяц</span></div>
                </div>
                <div class="absolute" style="left: 50%; bottom: -80px; transform: translateX(-50%); z-index: 30;">
                    <div class="cat-label"><span data-i18n="name-2">Луна</span> <span class="age" data-i18n="age-2">2 месяца</span></div>
                </div>
                <div class="absolute" style="right: 15%; bottom: -40px; z-index: 30;">
                    <div class="cat-label"><span data-i18n="name-3">Арсений</span> <span class="age" data-i18n="age-3">3 месяца</span></div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-24 px-12 bg-background">
        <div class="max-w-[1440px] mx-auto grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
            <div class="space-y-12">
                <div class="flex items-center gap-6">
                    <div class="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center overflow-hidden">
                        <img src="image_5758ab.png" class="w-10">
                    </div>
                    <div>
                        <h3 class="text-xl font-bold mb-2">С нами стали счастливыми более 10 000 клиентов</h3>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div class="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center overflow-hidden">
                        <img src="image_57aa25.png" class="w-10">
                    </div>
                    <div>
                        <h3 class="text-xl font-bold mb-2">Мы даем гарантию на продукты</h3>
                    </div>
                </div>
            </div>
            <div class="text-right flex flex-col items-end">
                <h2 class="text-3xl font-black mb-12 max-w-md">Звоните и пишите нам мы находимся на Пхукете</h2>
                <div class="w-20">
                    <img src="image_57aa2b.png" class="rotate-180">
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
