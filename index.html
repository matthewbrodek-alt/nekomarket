<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nekomarket - Perfect Copy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header class="header">
        <h1>NEKOMARKET</h1>
        <p>Ваш помощник в аренде<br>пушистого друга</p>
        <div class="top-right-cat"></div>
    </header>

    <div class="hero">
        <div class="hero-logo">
            <span class="neko">NEKO</span>
            <span class="market">market</span>
        </div>
    </div>

    <div class="employees">
        <h2>Наши сотрудники</h2>
        <div class="cats-bar-wrapper">
            <div class="cats-bar"></div>
            <svg class="lines-svg" viewBox="0 0 400 200">
                <path d="M300,40 L340,100" stroke="white" stroke-width="8" fill="none" />
                <path d="M200,40 L230,140" stroke="white" stroke-width="8" fill="none" />
                <path d="M100,40 L120,180" stroke="white" stroke-width="8" fill="none" />
            </svg>
        </div>
        
        <div class="labels-container">
            <div class="brush-label label-arseniy">Арсений 3 месяца</div>
            <div class="brush-label label-vladimir">Владимир 4 месяца</div>
            <div class="brush-label label-pietro">Пьетро Санчез младший 1 месяц</div>
        </div>
    </div>

    <div class="info-section">
        <div class="info-block">
            <div class="info-text-left">
                <p>С нами стали счастливыми более<br>10 000 клиентов.</p>
                <p>Мы даем гарантию на продукты</p>
            </div>
            <div class="cat-thumbs-up"></div>
        </div>

        <div class="bottom-contact">
            <div class="cat-two-thumbs"></div>
            <div class="contact-text">
                Звоните и пишите нам<br>мы находимся на Пхукете
            </div>
        </div>
    </div>
</div>

</body>
</html>
