<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nekomarket - Clean Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="header-left">
            <h1>NEKOMARKET</h1>
            <p>Ваш помощник в аренде<br>пушистого друга</p>
        </div>
        <div class="top-right-cat"></div>
    </header>

    <div class="hero">
        <div class="hero-logo-wrapper">
            <div class="logo-neko">NEKO</div>
            <div class="logo-market">market</div>
        </div>
    </div>

    <div class="employees">
        <h2>Наши сотрудники</h2>
        <div class="cats-bar-big">
            <div class="cats-frame">
                <img src="image_57aa69.png" alt="Сотрудники">
            </div>
        </div>
        
        <div class="labels-container">
            <div class="label-box label-pietro">Пьетро Санчез младший 1 месяц</div>
            <div class="label-box label-vladimir">Владимир 4 месяца</div>
            <div class="label-box label-arseniy">Арсений 3месяца</div>
        </div>
    </div>

    <div class="info-section">
        <div class="info-block">
            <div class="info-text">
                <p>С нами стали счастливыми более<br>10 000 клиентов .</p>
                <p>Мы даем гарантию на продукты</p>
            </div>
            <div class="cat-thumb"></div>
        </div>

        <div class="footer-contact">
            <div class="cat-double-thumb"></div>
            <div class="contact-note">
                Звоните и пишите нам<br>мы находимся на Пхукете
            </div>
        </div>
    </div>
</div>

</body>
</html>
