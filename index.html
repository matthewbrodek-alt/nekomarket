<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>NEKOMARKET — Boutique Feline Experience</title>
    
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Inter:wght@400;500;600&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">

    <nav class="fixed top-0 w-full z-50 bg-[#f9f9f9]/80 backdrop-blur-md">
        <div class="flex justify-between items-start px-12 py-6 max-w-[1440px] mx-auto">
            <div class="flex flex-col gap-1">
                <span class="text-2xl font-montserrat font-bold uppercase logo-underline text-primary">NEKOMARKET</span>
                <span class="text-[10px] uppercase tracking-widest text-secondary font-medium" data-i18n="nav-subtitle">Ваш помощник в аренде пушистого друга</span>
            </div>
            
            <div class="hidden lg:flex gap-8 items-center pt-2">
                <a class="text-primary font-bold border-b-2 border-primary" href="#" data-i18n="nav-boutique">Boutique</a>
                <a class="text-secondary hover:text-primary transition-colors" href="#" data-i18n="nav-felines">Our Felines</a>
                
                <div class="flex gap-2 ml-4 bg-gray-200/50 p-1 rounded-full text-[10px] font-bold">
                    <button onclick="changeLanguage('ru')" id="btn-ru" class="px-2 py-1 rounded-full transition-all bg-primary text-white">RU</button>
                    <button onclick="changeLanguage('en')" id="btn-en" class="px-2 py-1 rounded-full transition-all text-secondary">EN</button>
                </div>
            </div>

            <div class="flex items-start gap-6">
                <button class="bg-primary text-white px-8 py-3 rounded-lg font-bold shadow-md hover:opacity-90 transition-all" data-i18n="btn-rent">Rent a Cat</button>
                <div class="w-20 -mt-6">
                    <img alt="Peeking cat" src="image_57aa2b.png">
                </div>
            </div>
        </div>
    </nav>

    <header class="relative w-full h-[100vh] min-h-[800px] overflow-hidden flex flex-col items-center justify-center">
        <div class="absolute inset-0 z-0">
            <img class="w-full h-full object-cover" src="image_5758a6.jpg">
        </div>
        <div class="relative z-10 text-center select-none">
            <h1 class="text-[14rem] font-black font-montserrat text-white leading-[0.8] opacity-90 mix-blend-overlay">NEKO</h1>
            <h1 class="text-[10rem] font-black font-montserrat text-white leading-[0.8] opacity-80">market</h1>
        </div>
    </header>

    <section class="py-32 px-12 bg-white overflow-hidden">
        <div class="max-w-[1440px] mx-auto text-center">
            <h2 class="text-5xl font-black font-headline mb-20" data-i18n="team-title">Наши сотрудники</h2>
            
            <div class="relative max-w-4xl mx-auto" id="team-area">
                <img src="image_57aa69.png" class="w-full shadow-2xl rounded-2xl border border-gray-100 relative z-10">

                <svg class="absolute inset-0 w-full h-full pointer-events-none z-20" viewBox="0 0 800 500" preserveAspectRatio="none">
                    <path d="M 150 460 Q 150 350 185 225" class="arrow-path" />
                    <circle cx="185" cy="225" r="4" class="arrow-dot" />

                    <path d="M 400 480 Q 400 350 415 165" class="arrow-path" />
                    <circle cx="415" cy="165" r="4" class="arrow-dot" />

                    <path d="M 650 460 Q 650 350 625 255" class="arrow-path" />
                    <circle cx="625" cy="255" r="4" class="arrow-dot" />
                </svg>

                <div class="absolute" style="left: 10%; bottom: -30px; z-index: 30;">
                    <div class="cat-label">
                        <span data-i18n="name-1">Пьетро Санчез младший</span> 
                        <span class="age" data-i18n="age-1">1 месяц</span>
                    </div>
                </div>

                <div class="absolute" style="left: 50%; bottom: -60px; transform: translateX(-50%); z-index: 30;">
                    <div class="cat-label">
                        <span data-i18n="name-2">Луна</span> 
                        <span class="age" data-i18n="age-2">2 месяца</span>
                    </div>
                </div>

                <div class="absolute" style="right: 10%; bottom: -30px; z-index: 30;">
                    <div class="cat-label">
                        <span data-i18n="name-3">Арсений</span> 
                        <span class="age" data-i18n="age-3">3 месяца</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
