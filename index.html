<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nekomarket - Full Transparent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <header class="header">
        <h1>NEKOMARKET</h1>
        <p>Ваш помощник в аренде<br>пушистого друга</p>
        <div class="top-right-cat"></div>
    </header>

    <div class="hero">
        <div class="hero-logo">
            <span class="neko">NEKO</span>
            <span class="market">market</span>
        </div>
    </div>

    <div class="employees">
        <h2>Наши сотрудники</h2>
        <div class="cats-bar-wrapper">
            <div class="cats-bar"></div>
            <svg class="arrows-svg" viewBox="0 0 400 250">
                <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="red" />
                    </marker>
                    <filter id="handwritten">
                        <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise" />
                        <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
                    </filter>
                </defs>
                <g filter="url(#handwritten)" fill="none" stroke="red" stroke-width="3">
                    <path d="M80,230 Q95,160 115,105" marker-end="url(#arrowhead)" />
                    <path d="M200,210 Q205,150 200,105" marker-end="url(#arrowhead)" />
                    <path d="M320,180 Q290,140 260,105" marker-end="url(#arrowhead)" />
                </g>
            </svg>
        </div>
        
        <div class="labels-container">
            <div class="label label-pietro">Пьетро Санчез младший 1 месяц</div>
            <div class="label label-vladimir">Владимир 4 месяца</div>
            <div class="label label-arseniy">Арсений 3 месяца</div>
        </div>
    </div>

    <div class="info-section">
        <div class="info-block">
            <div class="info-text-left">
                <p>С нами стали счастливыми более<br>10 000 клиентов.</p>
                <p>Мы даем гарантию на продукты</p>
            </div>
            <div class="cat-thumbs-up"></div>
        </div>

        <div class="bottom-contact">
            <div class="cat-two-thumbs"></div>
            <div class="contact-text">
                Звоните и пишите нам<br>мы находимся на Пхукете
            </div>
        </div>
    </div>
</div>

</body>
</html>
